<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — IsThisAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FBF9F4; --panel: #FFFFFF; --ink: #1C1C1C; --muted: #8A8578;
    --border: #E7E2D6; --stamp-ai: #B3261E; --accent: #C9A227; --accent-tint: #F3E9D2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.035) 1px, transparent 0);
    background-size: 22px 22px; color: var(--ink); font-family: 'Lora', Georgia, serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
  }
  a { color: inherit; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
  .brand-mark { width: 32px; height: 32px; border-radius: 7px; background: var(--ink); color: var(--paper);
    display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px; }
  .brand-name { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 18px; }

  .auth-card {
    width: 100%; max-width: 400px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 20px 44px rgba(28,28,28,0.08);
    padding: 8px 36px 36px; position: relative; overflow: hidden;
  }
  .auth-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: repeating-linear-gradient(90deg, var(--ink) 0 14px, transparent 14px 22px); opacity: 0.06;
  }
  .eyebrow { font-family: 'Oswald', sans-serif; font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted); margin: 26px 0 6px; }
  h1 { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
  .sub { font-size: 13.5px; color: var(--muted); margin: 0 0 26px; }

  label { display: block; font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .field { margin-bottom: 18px; }
  input[type="email"], input[type="password"] {
    width: 100%; font-family: 'Lora', Georgia, serif; font-size: 14.5px; color: var(--ink);
    background: var(--paper); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px;
    outline: none; transition: border-color 0.2s ease;
  }
  input:focus { border-color: var(--ink); }

  button.submit {
    width: 100%; font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; background: var(--ink); color: var(--paper); border: none; border-radius: 6px;
    padding: 13px; cursor: pointer; margin-top: 6px; transition: background 0.2s ease, transform 0.15s ease;
  }
  button.submit:hover:not(:disabled) { background: #333; transform: translateY(-1px); }
  button.submit:disabled { opacity: 0.55; cursor: not-allowed; }

  .error-box {
    border: 1px solid var(--stamp-ai); color: var(--stamp-ai); background: rgba(179,38,30,0.06);
    padding: 11px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 18px;
  }
  .switch-line { text-align: center; font-size: 13px; color: var(--muted); margin-top: 22px; }
  .switch-line a { color: var(--ink); font-weight: 600; }
  .switch-line a:hover { text-decoration: underline; }
  .back-link { font-size: 12.5px; color: var(--muted); margin-top: 22px; }
  .back-link a:hover { color: var(--ink); }
</style>
</head>
<body>

<a href="/" class="brand">
  <div class="brand-mark">IA</div>
  <div class="brand-name">IsThisAI</div>
</a>

<div class="auth-card">
  <div class="eyebrow">Case File · Digital Forensics</div>
  <h1>Log in</h1>
  <p class="sub">Pick up where you left off — your case file and examinations are waiting.</p>

  <div class="error-box" id="errorBox" hidden></div>

  <form id="loginForm">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
    </div>
    <button class="submit" type="submit" id="submitBtn">Log in</button>
  </form>

  <div class="switch-line">Don't have an account? <a href="/signup">Sign up free</a></div>
</div>

<div class="back-link"><a href="/">← Back to home</a></div>

<script>
  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('errorBox');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.hidden = true;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in…';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });

      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error(`Server error (${res.status}). Please try again in a moment.`);
      }
      if (!res.ok) throw new Error(data.detail || 'Login failed.');

      localStorage.setItem('isthisai_token', data.access_token);
      window.location.href = '/app';
    } catch (err) {
      errorBox.textContent = err.message || 'Something went wrong.';
      errorBox.hidden = false;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Log in';
    }
  });

  // Already logged in? Skip straight to the app.
  if (localStorage.getItem('isthisai_token')) {
    window.location.href = '/app';
  }
</script>

</body>
</html>
